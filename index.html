<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree & Shriyan Dhaba POS - Sync Enabled</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9800, #ff5722);
        padding: 10px;
        margin: 0;
    }
    .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 15px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    h2 { text-align: center; color: #d84315; margin: 10px 0; }
    h3, h4 { color: #d84315; }
    input, select, button {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        border-radius: 8px;
        border: 1px solid #ddd;
        box-sizing: border-box;
    }
    button {
        background: #2e7d32;
        color: white;
        border: none;
        font-size: 16px;
        cursor: pointer;
        margin-top: 5px;
    }
    button:hover { opacity: 0.9; }
    .total {
        font-size: 22px;
        font-weight: bold;
        color: #d84315;
        text-align: center;
        margin: 15px 0;
    }
    .menu-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #fff3e0;
        border: 2px solid #ff9800;
        border-radius: 10px;
        padding: 12px;
        margin: 10px 0;
    }
    #ordersPanel {
        background: #fff3e0;
        border: 3px solid #d84315;
        border-radius: 12px;
        padding: 15px;
        margin-top: 15px;
        max-height: 400px;
        overflow-y: auto;
    }
    .success-toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #2e7d32;
        color: white;
        padding: 14px 24px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        z-index: 1000;
        display: none;
        font-weight: bold;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
    .logo img { width: 100px; display: block; margin: auto; }
</style>
</head>
<body>
<div class="container">

    <!-- STAFF POS VIEW -->
    <div id="staffView">
        <div class="logo">
            <img src="LOGO.png" alt="Logo">
            <h2>Shree & Shriyan Dhaba</h2>
            <p style="text-align:center;color:#d84315;font-weight:bold;">STAFF POS</p>
        </div>

        <input id="customerName" placeholder="Customer Name (optional)">
        <input id="invoice" readonly>

        <select id="item"></select>
        <input id="qty" type="number" placeholder="Qty" value="1">

        <button onclick="addItem()">➕ Add Item</button>
        <button onclick="voiceAdd()">🎤 Voice Add</button>

        <table border="1">
            <thead><tr><th>Item</th><th>Qty</th><th>Amt</th><th>X</th></tr></thead>
            <tbody id="bill"></tbody>
        </table>

        <label><input type="checkbox" id="gst" checked> GST 5%</label>
        <div class="total">Total: ₹ <span id="total">0</span></div>

        <button onclick="printBill()">🧾 Print Bill</button>
        <button onclick="exportExcel()">📊 Export Excel</button>
        <button onclick="sendWhatsApp()">📲 WhatsApp</button>
        <button onclick="dailyReport()">📊 Daily Report</button>
        <button onclick="showTableOrders()" style="background:#d84315;">📋 Live Table Orders</button>

        <!-- Menu Management -->
        <h4>Manage Menu (Real-time Sync)</h4>
        <input id="newItemName" placeholder="New Item Name">
        <input id="newItemPrice" type="number" placeholder="Price (₹)">
        <button onclick="addNewMenuItem()" style="background:#ff9800;">➕ Add / Update Item</button>
        <button onclick="showCurrentMenu()" style="background:#666;">📋 Show Current Menu</button>

        <!-- QR Generator -->
        <h4>Generate QR for Table Ordering</h4>
        <input id="qrTableNum" type="number" placeholder="Table Number">
        <button onclick="generateQRCode()" style="background:#ff9800;">📱 Generate Table QR</button>
        <div id="qrContainer" style="text-align:center;margin:15px 0;"></div>

        <div id="ordersPanel" style="display:none;"></div>
    </div>

    <!-- CUSTOMER VIEW -->
    <div id="customerView" style="display:none;">
        <div class="logo">
            <img src="LOGO.png" alt="Logo">
            <h2>Shree & Shriyan Dhaba</h2>
            <p style="text-align:center;color:#2e7d32;font-weight:bold;">TABLE ORDERING</p>
        </div>

        <div id="signInSection">
            <h3 style="text-align:center;">Welcome!</h3>
            <input id="custTable" type="number" placeholder="Your Table Number">
            <input id="custName" placeholder="Your Name (optional)">
            <button onclick="joinTable()" style="background:#d84315;font-size:18px;">✅ Start Ordering</button>
        </div>

        <div id="menuSection" style="display:none;">
            <h3 style="text-align:center;">Menu for Table <span id="displayTable" style="color:#d84315;"></span></h3>
            <p style="text-align:center;">Hello, <span id="displayName"></span>!</p>
            <div id="menuItems"></div>

            <h3>Your Order</h3>
            <table border="1">
                <thead><tr><th>Item</th><th>Qty</th><th>Amt</th><th>X</th></tr></thead>
                <tbody id="customerBill"></tbody>
            </table>
            <div class="total">Your Total: ₹ <span id="custTotal">0</span></div>

            <button onclick="placeCustomerOrder()" style="background:#d84315;">✅ Place Order for Kitchen</button>
            <button onclick="clearCustomerOrder()" style="background:#666;">🗑️ Clear Cart</button>
        </div>
    </div>
</div>

<!-- Success Toast -->
<div id="successToast" class="success-toast"></div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ====================== FIREBASE CONFIG ======================
const firebaseConfig = {
  apiKey: "AIzaSyCOtpaUWrVF6yAsHv9b-gj_OA0p5_hWAQ4",
  authDomain: "dhaba-bills.firebaseapp.com",
  databaseURL: "https://dhaba-bills-default-rtdb.firebaseio.com",
  projectId: "dhaba-bills",
  storageBucket: "dhaba-bills.firebasestorage.app",
  messagingSenderId: "1044375723943",
  appId: "1:1044375723943:web:828c2351f76858f870e082"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ====================== MENU - REAL-TIME FIREBASE ======================
let items = [];

function loadAndListenMenu() {
  const menuRef = db.ref('menu');

  // Initial load + real-time listener
  menuRef.on('value', (snapshot) => {
    const data = snapshot.val();
    
    if (data) {
      items = Object.values(data);
    } else {
      // Default menu if nothing in Firebase yet
      items = [
        {name: "Aloo Paratha", price: 50},
        {name: "Paneer Butter Masala", price: 180},
        {name: "Dal Tadka", price: 150},
        {name: "Naan", price: 40}
      ];
      saveMenu(); // Push default menu to Firebase on first run
    }

    // Update both views whenever menu changes
    renderStaffMenu();
    if (document.getElementById("menuSection") && 
        document.getElementById("menuSection").style.display !== "none") {
      loadCustomerMenu();
    }
  });
}

function saveMenu() {
  const menuObj = {};
  items.forEach((item, i) => {
    menuObj[i] = item;
  });
  db.ref('menu').set(menuObj);
}

function renderStaffMenu() {
  const select = document.getElementById("item");
  if (!select) return;
  select.innerHTML = '<option value="">-- Select Item --</option>';
  items.forEach((item, idx) => {
    select.innerHTML += `<option value="${idx}">${item.name} - ₹${item.price}</option>`;
  });
}

function addNewMenuItem() {
  const name = document.getElementById("newItemName").value.trim();
  const price = parseFloat(document.getElementById("newItemPrice").value);
  if (!name || isNaN(price)) return alert("Please enter valid name and price");

  const existing = items.findIndex(i => i.name.toLowerCase() === name.toLowerCase());
  if (existing !== -1) {
    items[existing].price = price;
    alert(`Price updated for "${name}"`);
  } else {
    items.push({name: name, price: price});
    alert(`New item "${name}" added successfully`);
  }
  saveMenu();
}

function showCurrentMenu() {
  let msg = "Current Menu (from Firebase):\n\n";
  items.forEach(i => msg += `• ${i.name} - ₹${i.price}\n`);
  alert(msg);
}

// ====================== STAFF BILL ======================
let bill = [];
let count = parseInt(localStorage.getItem("inv") || "1");
document.getElementById("invoice").value = "INV" + String(count).padStart(3, '0');

function addItem() {
  const idx = document.getElementById("item").value;
  if (idx === "") return alert("Select an item");
  const item = items[idx];
  const qty = parseInt(document.getElementById("qty").value) || 1;
  bill.push({...item, qty});
  renderBill();
}

function voiceAdd() {
  if (!('webkitSpeechRecognition' in window)) return alert("Voice not supported");
  let rec = new webkitSpeechRecognition();
  rec.onresult = function(e) {
    let text = e.results[0][0].transcript.toLowerCase();
    items.forEach(i => {
      if (text.includes(i.name.toLowerCase())) bill.push({...i, qty:1});
    });
    renderBill();
  };
  rec.start();
}

function del(i) { bill.splice(i,1); renderBill(); }

function renderBill() {
  let html = "", total = 0;
  bill.forEach((b, i) => {
    let t = b.qty * b.price;
    total += t;
    html += `<tr><td>${b.name}</td><td>${b.qty}</td><td>₹${t}</td><td onclick="del(${i})" style="color:red;cursor:pointer;">❌</td></tr>`;
  });
  if (document.getElementById("gst").checked) total *= 1.05;
  document.getElementById("bill").innerHTML = html;
  document.getElementById("total").innerText = total.toFixed(2);
}

// ====================== CUSTOMER ORDERING ======================
let customerOrder = [];
let currentTable = '';
let currentName = '';

function joinTable() {
  currentTable = document.getElementById("custTable").value.trim();
  currentName = document.getElementById("custName").value.trim() || "Guest";
  if (!currentTable) return alert("Please enter Table Number");

  document.getElementById("signInSection").style.display = "none";
  document.getElementById("menuSection").style.display = "block";
  document.getElementById("displayTable").innerText = currentTable;
  document.getElementById("displayName").innerText = currentName;

  loadCustomerMenu();
  renderCustomerOrder();
}

function loadCustomerMenu() {
  let html = '';
  items.forEach((item, idx) => {
    html += `<div class="menu-item">
      <span><strong>${item.name}</strong> <small>₹${item.price}</small></span>
      <button onclick="addCustomerItem(${idx})" style="background:#2e7d32;padding:8px 16px;border-radius:6px;">+ Add</button>
    </div>`;
  });
  document.getElementById("menuItems").innerHTML = html;
}

function addCustomerItem(idx) {
  let item = items[idx];
  let existing = customerOrder.find(o => o.name === item.name);
  if (existing) existing.qty += 1;
  else customerOrder.push({...item, qty: 1});
  renderCustomerOrder();
}

function renderCustomerOrder() {
  let html = "", total = 0;
  customerOrder.forEach((b, i) => {
    let t = b.qty * b.price;
    total += t;
    html += `<tr><td>${b.name}</td><td>${b.qty}</td><td>₹${t}</td><td onclick="delCustomerItem(${i})" style="color:red;cursor:pointer;">❌</td></tr>`;
  });
  document.getElementById("customerBill").innerHTML = html;
  document.getElementById("custTotal").innerText = total.toFixed(2);
}

function delCustomerItem(i) { customerOrder.splice(i,1); renderCustomerOrder(); }

function clearCustomerOrder() {
  if(confirm("Clear cart?")) { customerOrder = []; renderCustomerOrder(); }
}

function placeCustomerOrder() {
  if (customerOrder.length === 0) return alert("Cart is empty!");

  let orders = JSON.parse(localStorage.getItem("tableOrders") || "[]");
  let total = parseFloat(document.getElementById("custTotal").innerText);

  orders.push({
    id: Date.now(),
    table: currentTable,
    name: currentName,
    items: JSON.parse(JSON.stringify(customerOrder)),
    total: total,
    timestamp: new Date().toLocaleString(),
    status: "pending"
  });

  localStorage.setItem("tableOrders", JSON.stringify(orders));

  bill = customerOrder.map(i => ({...i}));
  renderBill();
  saveBillWithSync(true);

  alert(`✅ Order Placed for Table ${currentTable}`);
  customerOrder = [];
  renderCustomerOrder();
}

// ====================== LIVE TABLE ORDERS ======================
function showTableOrders() {
  document.getElementById("ordersPanel").style.display = "block";
  renderLiveOrders();
}

function hideOrdersPanel() { document.getElementById("ordersPanel").style.display = "none"; }

function renderLiveOrders() {
  let orders = JSON.parse(localStorage.getItem("tableOrders") || "[]");
  let pending = orders.filter(o => o.status === "pending");
  let html = `<h3>📋 Live Table Orders (${pending.length} pending)</h3>`;
  if (pending.length === 0) {
    html += "<p>No pending orders.</p>";
  } else {
    html += `<table border="1" width="100%"><thead><tr><th>Table</th><th>Name</th><th>Items</th><th>Total</th><th>Time</th><th>Action</th></tr></thead><tbody>`;
    pending.forEach((ord, idx) => {
      let itemList = ord.items.map(it => `${it.name}×${it.qty}`).join("<br>");
      html += `<tr><td><strong>Table ${ord.table}</strong></td><td>${ord.name}</td><td>${itemList}</td><td>₹${ord.total}</td><td>${ord.timestamp}</td><td><button onclick="acceptOrder(${idx})" style="background:#2e7d32;color:white;">✅ Accept</button></td></tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `<button onclick="hideOrdersPanel()" style="margin-top:10px;background:#d84315;">Close</button>`;
  document.getElementById("ordersPanel").innerHTML = html;
}

function acceptOrder(idx) {
  let orders = JSON.parse(localStorage.getItem("tableOrders") || "[]");
  let ord = orders[idx];
  if (!ord) return;
  bill = bill.concat(ord.items.map(item => ({...item})));
  renderBill();
  ord.status = "accepted";
  localStorage.setItem("tableOrders", JSON.stringify(orders));
  alert(`Order from Table ${ord.table} added to bill`);
  renderLiveOrders();
}

// ====================== OTHER FUNCTIONS ======================
function showSuccess(msg) {
  const toast = document.getElementById("successToast");
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(() => { toast.style.display = "none"; }, 3000);
}

function saveBillWithSync(isFromCustomer) {
  const invoice = document.getElementById("invoice").value || "INV-" + Date.now();
  const customerName = isFromCustomer ? currentName : (document.getElementById("customerName").value || "Walk-in");
  const tableNumber = isFromCustomer ? currentTable : "N/A";
  const total = isFromCustomer ? document.getElementById("custTotal").innerText : document.getElementById("total").innerText;

  const billData = {
    timestamp: new Date().toLocaleString(),
    invoice: invoice,
    customerName: customerName,
    tableNumber: tableNumber,
    total: parseFloat(total) || 0,
    items: (isFromCustomer ? customerOrder : bill).map(item => `${item.name} x${item.qty}`).join(" | ")
  };

  db.ref('bills/' + Date.now()).set(billData);
  showSuccess("✅ Bill saved to Firebase");
}

function printBill() { saveBillWithSync(false); window.print(); }
function exportExcel() {
  let csv = "Item,Qty,Price\n";
  bill.forEach(b => csv += `${b.name},${b.qty},${b.price}\n`);
  let blob = new Blob([csv], {type: "text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "bill.csv";
  a.click();
}
function sendWhatsApp() {
  let msg = `Shree & Shriyan Dhaba\nInvoice: ${document.getElementById("invoice").value}\n\n`;
  bill.forEach(b => msg += `${b.name} x${b.qty}\n`);
  msg += `Total: ₹${document.getElementById("total").innerText}`;
  window.open("https://wa.me/?text=" + encodeURIComponent(msg));
}
function dailyReport() {
  alert("Daily Report - Check Firebase or Google Sheet");
}
function generateQRCode() {
  const tableNo = document.getElementById("qrTableNum").value.trim();
  if (!tableNo) return alert("Enter table number");
  const hostedUrl = window.location.href.split('?')[0];
  const orderLink = `${hostedUrl}?mode=customer&table=${tableNo}`;
  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(orderLink)}`;
  document.getElementById("qrContainer").innerHTML = `<img src="${qrSrc}" style="width:250px;border:8px solid #d84315;border-radius:12px;"><p>Table ${tableNo} QR Code</p>`;
}

// ====================== INITIALIZE ======================
function initializeApp() {
  const urlParams = new URLSearchParams(window.location.search);
  const mode = urlParams.get('mode');
  currentTable = urlParams.get('table') || '';

  if (mode === 'customer') {
    document.getElementById('staffView').style.display = 'none';
    document.getElementById('customerView').style.display = 'block';
    document.getElementById('custTable').value = currentTable;
  } else {
    document.getElementById('staffView').style.display = 'block';
  }

  // Start Firebase menu sync
  loadAndListenMenu();
}

initializeApp();

window.onbeforeunload = function() {
  localStorage.setItem("inv", ++count);
};
</script>
</body>
</html>
